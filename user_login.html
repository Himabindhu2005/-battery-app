<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #1e293b; padding: 40px; border-radius: 16px; width: 100%; max-width: 420px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
        h2 { text-align: center; color: #38bdf8; margin-bottom: 24px; font-size: 1.8rem; }
        label { display: block; margin-bottom: 6px; color: #94a3b8; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; margin-bottom: 18px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 1rem; }
        input:focus { outline: none; border-color: #38bdf8; }
        button { width: 100%; padding: 12px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; }
        button:hover { background: #0ea5e9; }
        .link { text-align: center; margin-top: 16px; color: #94a3b8; }
        .link a { color: #38bdf8; text-decoration: none; }
        .alert { padding: 10px; border-radius: 8px; margin-bottom: 16px; font-size: 0.9rem; background: #ef444420; color: #ef4444; border: 1px solid #ef4444; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔋 Login</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}
                <div class="alert">{{ msg }}</div>
            {% endfor %}
        {% endwith %}
        <form method="POST">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required>
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
            <button type="submit">Login</button>
        </form>
        <div class="link">Don't have an account? <a href="/user_registration">Register</a></div>
    </div>
</body>
</html>
