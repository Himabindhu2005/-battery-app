<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; padding: 40px; }
        h2 { font-size: 2rem; color: #38bdf8; margin-bottom: 10px; }
        p { color: #94a3b8; margin-bottom: 30px; }
        .btn { display: inline-block; padding: 12px 30px; margin: 8px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 1rem; transition: all 0.3s; }
        .btn-primary { background: #38bdf8; color: #0f172a; }
        .btn-primary:hover { background: #0ea5e9; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Welcome, {{ session['username'] }}! 👋</h2>
        <p>Ready to predict battery health?</p>
        <a href="/predict" class="btn btn-primary">🔍 Start Prediction</a>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>
</body>
</html>
